services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mongodb-crud-app
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      url: mongodb://mongo:27017/crud
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:8
    container_name: mongodb-crud-db
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
